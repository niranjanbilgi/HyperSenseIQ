name: Update Brent Price
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Fetch price
        run: python3 fetch_brent.py
      - name: Commit
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add data/brent.json
          git diff --staged --quiet || git commit -m update-brent
          git push
