name: Update Brent Price
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and save Brent price
        run: |
          mkdir -p data
          python3 - << 'PYEOF'
import urllib.request, json, subprocess, os
from datetime import datetime

price = 90.15  # fallback

sources = [
    ("Yahoo Finance", "https://query1.finance.yahoo.com/v8/finance/chart/BZ=F?interval=1d&range=1d", 
     lambda d: d["chart"]["result"][0]["meta"]["regularMarketPrice"]),
    ("Stooq", "https://stooq.com/q/l/?s=brent.f&f=sd2t2ohlcv&h&e=json",
     lambda d: float(list(d["symbols"].values())[0]["close"])),
    ("Alpha Vantage", "https://www.alphavantage.co/query?function=BRENT&interval=daily&apikey=demo",
     lambda d: float(d["data"][0]["value"])),
]

for name, url, extractor in sources:
    try:
        req = urllib.request.Request(url, headers={"User-Agent": "Mozilla/5.0"})
        with urllib.request.urlopen(req, timeout=10) as r:
            d = json.loads(r.read())
        p = extractor(d)
        if 40 < p < 200:
            price = round(p, 2)
            print(f"Got {price} USD from {name}")
            break
    except Exception as e:
        print(f"{name} failed: {e}")

out = {"price_usd": price, "timestamp": datetime.utcnow().strftime("%Y-%m-%dT%H:%M:%SZ"), "source": "Auto"}
with open("data/brent.json", "w") as f:
    json.dump(out, f)
print(f"Saved: {out}")
PYEOF

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/brent.json
          git diff --staged --quiet || git commit -m "chore: update Brent price"
          git push
