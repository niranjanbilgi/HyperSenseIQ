name: Update Brent Price
on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Brent price (no API key needed)
        run: |
          mkdir -p data

          # Method 1: Yahoo Finance (works from GitHub Actions server — no CORS issue here)
          PRICE=$(curl -s --max-time 10 \
            "https://query1.finance.yahoo.com/v8/finance/chart/BZ=F?interval=1d&range=1d" \
            -H "User-Agent: Mozilla/5.0" | \
            python3 -c "
import sys,json
try:
    d=json.load(sys.stdin)
    p=d['chart']['result'][0]['meta']['regularMarketPrice']
    if 40<p<200: print(round(p,2))
    else: print(0)
except: print(0)
" 2>/dev/null)

          echo "Yahoo Finance Brent: $PRICE"

          # Method 2: Stooq (backup)
          if [ "$PRICE" = "0" ] || [ -z "$PRICE" ]; then
            PRICE=$(curl -s --max-time 10 \
              "https://stooq.com/q/l/?s=brent.f&f=sd2t2ohlcv&h&e=json" | \
              python3 -c "
import sys,json
try:
    d=json.load(sys.stdin)
    syms=d.get('symbols',{})
    key=list(syms.keys())[0] if syms else ''
    p=float(syms[key].get('close',0))
    if 40<p<200: print(round(p,2))
    else: print(0)
except: print(0)
" 2>/dev/null)
            echo "Stooq Brent: $PRICE"
          fi

          # Method 3: Alpha Vantage demo (backup)
          if [ "$PRICE" = "0" ] || [ -z "$PRICE" ]; then
            PRICE=$(curl -s --max-time 10 \
              "https://www.alphavantage.co/query?function=BRENT&interval=daily&apikey=demo" | \
              python3 -c "
import sys,json
try:
    d=json.load(sys.stdin)
    p=float(d['data'][0]['value'])
    if 40<p<200: print(round(p,2))
    else: print(0)
except: print(0)
" 2>/dev/null)
            echo "Alpha Vantage Brent: $PRICE"
          fi

          # Fallback
          if [ "$PRICE" = "0" ] || [ -z "$PRICE" ]; then
            PRICE="90.15"
            echo "Using fallback: $PRICE"
          fi

          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "{\"price_usd\":$PRICE,\"timestamp\":\"$TIMESTAMP\",\"source\":\"Auto\"}" > data/brent.json
          echo "✅ Final Brent price: \$$PRICE/bbl"
          cat data/brent.json

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/brent.json
          git diff --staged --quiet || git commit -m "chore: Brent \$$(python3 -c 'import json;print(json.load(open(\"data/brent.json\"))[\"price_usd\"])')/bbl"
          git push
