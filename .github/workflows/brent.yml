      - name: Fetch Brent price
        run: |
          RESPONSE=$(curl -s "https://www.alphavantage.co/query?function=BRENT&interval=1min&apikey=${{ secrets.AV_KEY }}")
          PRICE=$(echo "$RESPONSE" | jq -r '.data[0].value')
          TIMESTAMP=$(date +%s)
          echo "{ \"symbol\": \"BRENTOIL\", \"price\": $PRICE, \"timestamp\": $TIMESTAMP }" > data/brent.json
