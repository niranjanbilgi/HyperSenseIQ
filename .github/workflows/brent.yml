name: Update Brent Price

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  update-brent:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Fetch Brent price
        run: |
          PRICE=$(curl -s "https://www.alphavantage.co/query?function=BRENT&interval=1min&apikey=${{ secrets.AV_KEY }}" | jq -r '.["Realtime Commodity Data"][0].price')
          TIMESTAMP=$(date +%s)
          echo "{ \"symbol\": \"BRENTOIL\", \"price\": $PRICE, \"timestamp\": $TIMESTAMP }" > data/brent.json

      - name: Commit updated price
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add data/brent.json
          git commit -m "Update Brent price" || echo "No changes to commit"
          git push
