name: Update Brent Price

on:
  schedule:
    - cron: "0 */2 * * *"   # every 2 hours
  workflow_dispatch:

jobs:
  update-brent:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Fetch Brent price from FMP
      id: getprice
      run: |
        echo "Fetching Brent price..."

        # Call API
        RESPONSE=$(curl -s "https://financialmodelingprep.com/api/v3/quote/BRENTOIL?apikey=${{ secrets.FMP_API_KEY }}")

        # Extract price
        PRICE=$(echo "$RESPONSE" | jq -r '.[0].price')

        echo "API returned price: $PRICE"

        # Validate price
        if [ "$PRICE" = "null" ] || [ -z "$PRICE" ]; then
          echo "Price is null or empty. Skipping update."
          echo "valid=false" >> $GITHUB_OUTPUT
          exit 0
        fi

        # Validate numeric range
        if (( $(echo "$PRICE < 40" | bc -l) )) || (( $(echo "$PRICE > 200" | bc -l) )); then
          echo "Price out of expected range. Skipping update."
          echo "valid=false" >> $GITHUB_OUTPUT
          exit 0
        fi

        echo "valid=true" >> $GITHUB_OUTPUT
        echo "price=$PRICE" >> $GITHUB_OUTPUT

    - name: Update JSON file
      if: steps.getprice.outputs.valid == 'true'
      run: |
        PRICE=${{ steps.getprice.outputs.price }}
        TIMESTAMP=$(date +%s)

        echo "Writing new JSON..."
        echo "{ \"symbol\": \"BRENTOIL\", \"price\": $PRICE, \"timestamp\": $TIMESTAMP }" > data/brent.json

    - name: Commit changes
      if: steps.getprice.outputs.valid == 'true'
      run: |
        git config --global user.name "GitHub Actions"
        git config --global user.email "actions@github.com"
        git add data/brent.json
        git commit -m "Update Brent price to ${{ steps.getprice.outputs.price }}"
        git push

