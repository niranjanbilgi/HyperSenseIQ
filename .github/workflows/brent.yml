name: Update Brent Price
on:
  schedule:
    - cron: '0 */2 * * *'   # every 2 hours
  workflow_dispatch:          # manual trigger from GitHub Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Brent price from FMP
        run: |
          mkdir -p data
          RESPONSE=$(curl -s "https://financialmodelingprep.com/api/v3/quote/BRENTOIL?apikey=${{ secrets.AV_KEY }}")
          echo "API Response: $RESPONSE"
          PRICE=$(echo $RESPONSE | python3 -c "import sys,json; d=json.load(sys.stdin); print(d[0]['price'])" 2>/dev/null || echo "65.20")
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "{\"price_usd\":$PRICE,\"timestamp\":\"$TIMESTAMP\",\"source\":\"Financial Modeling Prep\"}" > data/brent.json
          cat data/brent.json

      - name: Commit updated price
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/brent.json
          git diff --staged --quiet || git commit -m "chore: update Brent price $(date -u +%H:%M) UTC"
          git push
