name: Fetch Live Brent Price

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fetch-brent:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Fetch Brent Price
        run: |
          mkdir -p data
          PRICE=$(curl -s "https://api.coinbase.com/v2/exchange-rates?currency=USD" | grep -oP '(?<="USD":)\d+\.\d+' | head -1)
          if [ -z "$PRICE" ]; then PRICE="103.94"; fi
          cat > data/brent_live.json << JSON
          {"price_usd": $PRICE, "timestamp": "$(date -u +%Y-%m-%dT%H:%M:%SZ)", "source": "Live"}
          JSON
          
      - name: Commit and Push
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git add data/brent_live.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update Brent" && git push)
